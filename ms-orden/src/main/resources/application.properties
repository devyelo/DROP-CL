# ===========================
# ms-orden - DropCL
# ===========================
spring.application.name=ms-orden
server.port=8087

# ===========================
# Conexión MySQL (XAMPP)
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/dropCL_orden?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA + Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# URLs de otros microservicios
# ===========================
ms.listing.url=http://localhost:8085
ms.inventario.url=http://localhost:8084
ms.usuario.url=http://localhost:8082

# ===========================
# Logs
# ===========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.dropcl.msorden=INFO